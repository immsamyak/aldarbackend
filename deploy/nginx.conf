server {
    listen 80;
    listen [::]:80;
    server_name api.aldargroup.com;

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    root /var/www/aldar-api/public;
    index index.php index.html;

    charset utf-8;

    # ─── Logging ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/aldar-api-access.log;
    error_log  /var/log/nginx/aldar-api-error.log;

    # ─── Security headers ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ─── Gzip ────────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # ─── Upload limits ───────────────────────────────────────────────────
    client_max_body_size 20M;

    # ─── Main location ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ─────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    # ─── Storage/uploads (public files) ──────────────────────────────────
    location /storage {
        alias /var/www/aldar-api/storage/app/public;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Static assets caching ───────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|css|js)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Deny dotfiles ───────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ─── Deny vendor/node_modules ────────────────────────────────────────
    location ~ ^/(vendor|node_modules) {
        deny all;
        return 404;
    }
}

