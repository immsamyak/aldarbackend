###############################################################################
# ALDAR API — Docker Compose (Production)
# Used by Coolify or standalone Docker deployment.
#
# Coolify will auto-detect this file and deploy all services.
# For standalone: docker compose -f docker-compose.prod.yml up -d
###############################################################################

services:
  # ─── Laravel API ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aldar-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4000}:80"
    environment:
      - APP_NAME=${APP_NAME:-AldarAPI}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:4000}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-aldar}
      - DB_USERNAME=${DB_USERNAME:-aldar_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - JWT_SECRET=${JWT_SECRET}
      - LOG_CHANNEL=stack
      - LOG_LEVEL=${LOG_LEVEL:-warning}
    volumes:
      - app-storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── MySQL 8 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: aldar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-aldar}
      MYSQL_USER: ${DB_USERNAME:-aldar_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  app-storage:
    driver: local
  mysql-data:
    driver: local
